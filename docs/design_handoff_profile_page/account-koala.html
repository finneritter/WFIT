<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WFIT — Account (Koala direction)</title>
    <link rel="stylesheet" href="theme.css" />
    <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
    <style>
      html, body { height: 100%; margin: 0; }
      #root { height: 100vh; }
      /* icon helper for info rows */
      .ico { width: 14px; height: 14px; flex: none; stroke: var(--faint); fill: none; stroke-width: 1.7; stroke-linecap: round; stroke-linejoin: round; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="text/babel" src="design-canvas.jsx"></script>
    <script type="text/babel">
      /* ============================================================
         WFIT Account — modeled on Koala UI profile/user-management,
         re-skinned into WFIT's dark theme.css. Tenno trader profile:
         header + info columns + tabs + D/W/M stat cards + trades table.
         ============================================================ */
      const CARDS = [
        { k: "Platinum earned", ico: "M3 12a9 9 0 1 0 18 0 9 9 0 0 0-18 0M12 7v10M9 9h4.5a1.5 1.5 0 0 1 0 3H9", vals: { D: "410", W: "2,840", M: "8,920" }, u: "p", c: "var(--plat)" },
        { k: "Items sold", ico: "M3 7l9-4 9 4-9 4zM3 7v10l9 4 9-4V7", vals: { D: "18", W: "127", M: "483" }, u: "", c: "var(--ink)" },
        { k: "Ducats earned", ico: "M3 12a9 9 0 1 0 18 0 9 9 0 0 0-18 0M9 9l6 6M15 9l-6 6", vals: { D: "640", W: "6,420", M: "21,300" }, u: "d", c: "var(--ducat)" },
      ];
      const TRADES = [
        ["35783", "Mesa Prime Set", "MP", "t-legend", "Legendary", "sold", "485", "xX_Tenno", "TX", "today"],
        ["35784", "Arcane Energize", "EN", "t-legend", "Legendary", "sold", "380", "VoidWalker", "VW", "today"],
        ["35785", "Khora Prime Blueprint", "KP", "t-exotic", "Exotic", "bought", "96", "RelicHntr", "RH", "4h"],
        ["35786", "Serration", "SR", "t-rare", "Rare", "sold", "45", "ModDealer", "MD", "8h"],
        ["35787", "Condition Overload", "CO", "t-legend", "Legendary", "sold", "120", "Steel_Path", "SP", "1d"],
        ["35788", "Loki Prime Neuroptics", "LP", "t-exotic", "Exotic", "bought", "78", "PrimeVault", "PV", "1d"],
        ["35789", "Gauss Prime Set", "GP", "t-exotic", "Exotic", "sold", "280", "SpeedRunr", "SR", "2d"],
        ["35790", "Nova Prime Systems", "NP", "t-rare", "Rare", "sold", "32", "AntimatterX", "AX", "2d"],
        ["35791", "Rubico Prime", "RP", "t-exotic", "Exotic", "bought", "140", "Sniper_Elite", "SE", "3d"],
      ];
      const TABS = ["Overview", "Resources", "Armory", "Codex", "Stats"];

      const RES = [
        ["Ferrite", "Fe", "1.24M", "t-basic"], ["Alloy Plate", "Al", "842K", "t-basic"],
        ["Nano Spores", "Ns", "1.51M", "t-basic"], ["Salvage", "Sv", "690K", "t-basic"],
        ["Rubedo", "Ru", "388K", "t-rare"], ["Plastids", "Pl", "214K", "t-rare"],
        ["Polymer Bundle", "Pb", "410K", "t-basic"], ["Circuits", "Ci", "96K", "t-basic"],
        ["Oxium", "Ox", "58.4K", "t-rare"], ["Cryotic", "Cy", "88K", "t-rare"],
        ["Orokin Cell", "Oc", "1,240", "t-exotic"], ["Control Module", "Cm", "820", "t-exotic"],
        ["Neural Sensors", "Nu", "640", "t-exotic"], ["Neurodes", "Nd", "1,180", "t-exotic"],
        ["Argon Crystal", "Ar", "12", "t-legend"], ["Kuva", "Kv", "142K", "t-legend"],
      ];
      const CAREER = [["Hours played", "1,640", ""], ["Enemies defeated", "1.84", "M"], ["Missions cleared", "9,420", ""], ["Star chart", "98", "%"]];
      const MOST_USED = [["Saryn Prime", "SP", "t-legend", 28], ["Mesa Prime", "MP", "t-legend", 19], ["Wisp", "WI", "t-rare", 14], ["Octavia Prime", "OP", "t-exotic", 11], ["Khora", "KH", "t-exotic", 8]];
      const MISSIONS = [["Survival", 32], ["Exterminate", 21], ["Defense", 18], ["Void Fissure", 15], ["Capture", 14]];
      const PSTAT = [["Accuracy", "42", "%"], ["Deaths", "318", ""], ["Revives", "1,204", ""], ["Pickups", "284", "K"]];
      const ARM = [
        ["Warframes", [["Saryn Prime", "SP", "t-legend", 5], ["Mesa Prime", "MP", "t-legend", 4], ["Octavia Prime", "OP", "t-exotic", 6], ["Wisp", "WI", "t-rare", 3], ["Revenant", "RV", "t-rare", 2], ["Khora", "KH", "t-exotic", 4]]],
        ["Primary", [["Kuva Bramma", "KB", "t-legend", 6], ["Rubico Prime", "RP", "t-exotic", 3], ["Soma Prime", "SP", "t-rare", 2]]],
        ["Secondary", [["Kuva Nukor", "KN", "t-legend", 4], ["Lex Prime", "LP", "t-rare", 1]]],
        ["Melee", [["Kronen Prime", "KP", "t-exotic", 5], ["Nikana Prime", "NP", "t-rare", 3]]],
      ];
      const CDX = [["Warframes", 70], ["Primary", 50], ["Secondary", 58], ["Melee", 44], ["Companions", 67], ["Archwing", 75]];
      const TIERLBL = { "t-basic": "Common", "t-rare": "Uncommon", "t-exotic": "Rare", "t-legend": "Special" };
      const TIERVAR = { "t-basic": "var(--t-basic)", "t-rare": "var(--t-rare)", "t-exotic": "var(--t-exotic)", "t-legend": "var(--t-legend)" };
      const secH = { fontSize: 11, fontWeight: 700, textTransform: "uppercase", letterSpacing: ".06em", color: "var(--faint)", marginBottom: 8 };

      /* ---- shared ---- */
      function Emb({ size = 64 }) {
        return (
          <div style={{ width: size, height: size, flex: "none", border: "1px solid var(--line-2)", background: "#16131c", position: "relative", overflow: "hidden" }}>
            <div style={{ position: "absolute", inset: 0, background: "repeating-linear-gradient(45deg, rgba(124,116,160,.20) 0 6px, transparent 6px 12px)" }} />
            <svg viewBox="0 0 48 48" style={{ position: "absolute", inset: 0, width: "100%", height: "100%", padding: size * 0.16, boxSizing: "border-box" }}>
              <polygon points="24,4 42,14 42,34 24,44 6,34 6,14" fill="none" stroke="var(--soft)" strokeWidth="1.4" />
              <polygon points="24,14 33,19 33,29 24,34 15,29 15,19" fill="none" stroke="var(--accent)" strokeWidth="1.1" />
              <circle cx="24" cy="24" r="2.6" fill="var(--accent)" />
            </svg>
          </div>
        );
      }
      function Ico({ d }) { return <svg className="ico" viewBox="0 0 24 24"><path d={d} /></svg>; }
      function InfoRow({ d, children }) {
        return (
          <div style={{ display: "flex", alignItems: "center", gap: 8, fontSize: 12, color: "var(--soft)", marginTop: 9 }}>
            <Ico d={d} /><span>{children}</span>
          </div>
        );
      }
      /* dropdown-style colored pill (mimics the reference's Priority/Status pills) */
      function Pill({ label, color, dot }) {
        return (
          <span style={{ display: "inline-flex", alignItems: "center", gap: 6, border: "1px solid var(--line-2)", background: "var(--panel)", padding: "2px 7px", fontSize: 11, color: "var(--soft)" }}>
            {dot ? <span style={{ width: 6, height: 6, borderRadius: "50%", background: color, flex: "none" }} /> : <span style={{ width: 7, height: 7, background: color, flex: "none" }} />}
            <span style={{ color: "var(--ink)" }}>{label}</span>
            <svg className="ico" viewBox="0 0 24 24" style={{ width: 10, height: 10, stroke: "var(--faint)" }}><path d="M6 9l6 6 6-6" /></svg>
          </span>
        );
      }
      function BarRow({ name, mono, tier, pct, max }) {
        return (
          <div style={{ display: "grid", gridTemplateColumns: mono ? "26px 1fr 38px" : "1fr 38px", alignItems: "center", gap: 9, padding: "7px 0" }}>
            {mono && <div className={"gl " + tier} style={{ width: 24, height: 24 }}>{mono}</div>}
            <div>
              <div style={{ fontSize: 11.5, color: "var(--soft)", marginBottom: 4 }}>{name}</div>
              <div style={{ height: 6, background: "var(--line)", position: "relative" }}><i style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: (pct / max) * 100 + "%", background: "var(--accent)" }} /></div>
            </div>
            <span style={{ fontFamily: "var(--mono)", fontSize: 11.5, color: "var(--ink)", textAlign: "right" }}>{pct}%</span>
          </div>
        );
      }

      /* ============================== OVERVIEW (the modeled page) ============================== */
      function StatCard({ card }) {
        const [span, setSpan] = React.useState("W");
        return (
          <div style={{ border: "1px solid var(--line-2)", background: "var(--panel)", padding: "13px 15px", flex: 1, minWidth: 0 }}>
            <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
              <svg className="ico" viewBox="0 0 24 24" style={{ width: 15, height: 15, stroke: card.c === "var(--ink)" ? "var(--soft)" : card.c }}><path d={card.ico} /></svg>
              <span style={{ fontSize: 12, color: "var(--soft)", flex: 1 }}>{card.k}</span>
              <span style={{ display: "inline-flex", border: "1px solid var(--line-2)" }}>
                {["D", "W", "M"].map((s) => (
                  <button key={s} onClick={() => setSpan(s)} style={{ width: 26, height: 22, fontFamily: "var(--mono)", fontSize: 11, border: "none", borderLeft: s !== "D" ? "1px solid var(--line-2)" : "none", background: span === s ? "var(--accent)" : "var(--panel)", color: span === s ? "var(--accent-ink)" : "var(--soft)", cursor: "pointer", fontWeight: span === s ? 700 : 400 }}>{s}</button>
                ))}
              </span>
            </div>
            <div style={{ fontFamily: "var(--mono)", fontSize: 32, fontWeight: 800, letterSpacing: "-.03em", color: card.c, margin: "10px 0 4px", lineHeight: 1 }}>{card.vals[span]}{card.u && <span style={{ fontSize: 15, color: "var(--faint)" }}>{card.u}</span>}</div>
            <div style={{ fontSize: 11, color: "var(--faint)" }}>{span === "D" ? "today" : span === "W" ? "Jun 12 – Jun 18" : "May 18 – Jun 18"}</div>
          </div>
        );
      }
      function Overview() {
        const [sel, setSel] = React.useState({ 2: true });
        return (
          <div>
            <div style={{ display: "flex", gap: 12, marginBottom: 16 }}>
              {CARDS.map((c, i) => <StatCard key={i} card={c} />)}
            </div>
            {/* toolbar */}
            <div className="filters" style={{ marginBottom: 0 }}>
              <span className="search" style={{ flex: "1 1 240px", maxWidth: 320, height: 30 }}>
                <svg className="ico" viewBox="0 0 24 24"><circle cx="11" cy="11" r="7" /><line x1="16.5" y1="16.5" x2="21" y2="21" /></svg>
                <input placeholder="Search trades…" style={{ border: "none", background: "transparent", outline: "none", color: "var(--ink)", fontFamily: "var(--mono)", fontSize: 12, width: "100%" }} />
              </span>
              <button className="chip" style={{ height: 30 }}>⨯ Filter</button>
              <button className="chip" style={{ height: 30 }}>⇅ Sort</button>
              <span style={{ flex: 1 }} />
              <button className="btn pri sm">＋ New listing</button>
              <button className="btn sm">Export</button>
              <button className="btn sm">Columns</button>
            </div>
            {/* table */}
            <div className="tpanel" style={{ borderTop: "none" }}>
              <table className="dtable">
                <thead>
                  <tr>
                    <th style={{ width: 30 }}><input type="checkbox" /></th>
                    <th><button className="th-sort sorted">#&nbsp;Trade <span className="sort-arr">▼</span></button></th>
                    <th>Item</th>
                    <th><button className="th-sort">Rarity</button></th>
                    <th>Type</th>
                    <th className="r"><button className="th-sort">Price</button></th>
                    <th>Counterparty</th>
                    <th className="r">When</th>
                    <th style={{ width: 84 }}>Action</th>
                  </tr>
                </thead>
                <tbody>
                  {TRADES.map((t, i) => (
                    <tr key={i} style={{ background: sel[i] ? "var(--hover)" : "transparent" }} onClick={() => setSel((s) => ({ ...s, [i]: !s[i] }))}>
                      <td><input type="checkbox" checked={!!sel[i]} readOnly /></td>
                      <td className="num" style={{ color: "var(--soft)" }}>#{t[0]}</td>
                      <td><div className="dnm"><div className={"gl " + t[3]}>{t[2]}</div><div className="di"><span className="nm">{t[1]}</span></div></div></td>
                      <td><Pill label={t[4]} color={TIERVAR[t[3]]} /></td>
                      <td><Pill label={t[5]} color={t[5] === "sold" ? "var(--pos)" : "var(--hot)"} dot /></td>
                      <td className="r num" style={{ color: t[5] === "sold" ? "var(--pos)" : "var(--neg)" }}>{t[5] === "sold" ? "+" : "−"}{t[6]}p</td>
                      <td><div className="dnm"><div className="gl t-basic" style={{ width: 22, height: 22, fontSize: 9 }}>{t[8]}</div><div className="di"><span className="nm" style={{ fontWeight: 500 }}>{t[7]}</span></div></div></td>
                      <td className="r when">{t[9]}</td>
                      <td>
                        <span style={{ display: "inline-flex", gap: 6, color: "var(--faint)" }}>
                          <svg className="ico" viewBox="0 0 24 24" style={{ cursor: "pointer" }}><path d="M4 20h4l10-10-4-4L4 16z" /></svg>
                          <svg className="ico" viewBox="0 0 24 24" style={{ cursor: "pointer" }}><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7" /><circle cx="12" cy="12" r="2.5" /></svg>
                          <svg className="ico" viewBox="0 0 24 24" style={{ cursor: "pointer" }}><circle cx="12" cy="5" r="1.4" /><circle cx="12" cy="12" r="1.4" /><circle cx="12" cy="19" r="1.4" /></svg>
                        </span>
                      </td>
                    </tr>
                  ))}
                </tbody>
              </table>
            </div>
          </div>
        );
      }

      /* ============================== other tabs ============================== */
      function Resources() {
        const [pinned, setPinned] = React.useState([15, 10, 14]);
        const [over, setOver] = React.useState(false);
        const add = (i) => setPinned((p) => (p.includes(i) ? p : [...p, i]));
        const remove = (i) => setPinned((p) => p.filter((x) => x !== i));
        return (
          <div>
            <div style={secH}>Tracked resources <span style={{ fontFamily: "var(--mono)", color: "var(--faint)", textTransform: "none", letterSpacing: 0 }}>· drag a row up here</span></div>
            <div onDragOver={(e) => { e.preventDefault(); setOver(true); }} onDragLeave={() => setOver(false)}
              onDrop={(e) => { e.preventDefault(); setOver(false); const i = +e.dataTransfer.getData("text/plain"); if (!Number.isNaN(i)) add(i); }}
              style={{ display: "flex", gap: 10, flexWrap: "wrap", minHeight: 104, padding: 12, marginBottom: 20, border: "1px dashed " + (over ? "var(--accent)" : "var(--line-2)"), background: over ? "var(--hover)" : "var(--bg-2)" }}>
              {pinned.length === 0 && <div style={{ margin: "auto", color: "var(--faint)", fontSize: 12 }}>Drag a resource here to feature it</div>}
              {pinned.map((i) => {
                const r = RES[i];
                return (
                  <div key={i} style={{ position: "relative", width: 156, border: "1px solid var(--line-2)", borderTop: "2px solid " + TIERVAR[r[3]], background: "var(--panel)", padding: "12px 12px 11px" }}>
                    <button onClick={() => remove(i)} style={{ position: "absolute", top: 4, right: 4, width: 18, height: 18, border: "1px solid var(--line-2)", background: "var(--panel)", color: "var(--faint)", cursor: "pointer", fontSize: 10 }}>✕</button>
                    <div className={"gl " + r[3]} style={{ width: 34, height: 34, marginBottom: 9 }}>{r[1]}</div>
                    <div style={{ fontSize: 11, color: "var(--soft)" }}>{r[0]}</div>
                    <div style={{ fontFamily: "var(--mono)", fontSize: 26, fontWeight: 700, letterSpacing: "-.03em" }}>{r[2]}</div>
                    <div style={{ fontSize: 10, color: "var(--faint)", marginTop: 2 }}>{TIERLBL[r[3]]}</div>
                  </div>
                );
              })}
            </div>
            <div style={secH}>All resources <span style={{ fontFamily: "var(--mono)", color: "var(--faint)" }}>16</span></div>
            <table className="dtable">
              <thead><tr><th style={{ width: 22 }}></th><th>Resource</th><th>Rarity</th><th className="r">Quantity</th></tr></thead>
              <tbody>
                {RES.map((r, i) => (
                  <tr key={i} draggable onDragStart={(e) => e.dataTransfer.setData("text/plain", String(i))} onClick={() => add(i)} style={{ cursor: "grab" }}>
                    <td style={{ color: "var(--faint)" }}>⠿</td>
                    <td><div className="dnm"><div className={"gl " + r[3]}>{r[1]}</div><div className="di"><span className="nm">{r[0]}</span></div></div></td>
                    <td style={{ color: "var(--soft)" }}>{TIERLBL[r[3]]}</td>
                    <td className="r num">{r[2]}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        );
      }
      function Stats() {
        return (
          <div>
            <div style={{ display: "grid", gridTemplateColumns: "repeat(4, 1fr)", border: "1px solid var(--line-2)", background: "linear-gradient(100deg, var(--panel-2), var(--panel))", marginBottom: 16 }}>
              {CAREER.map((s, i) => (
                <div key={i} style={{ padding: "16px 20px", borderLeft: i ? "1px solid var(--line)" : "none" }}>
                  <div style={{ fontFamily: "var(--mono)", fontSize: 34, fontWeight: 800, letterSpacing: "-.04em", lineHeight: 1 }}>{s[1]}{s[2] && <span style={{ fontSize: 15, color: "var(--faint)", fontWeight: 600 }}>{s[2]}</span>}</div>
                  <div style={{ fontSize: 10, textTransform: "uppercase", letterSpacing: ".05em", color: "var(--faint)", marginTop: 6 }}>{s[0]}</div>
                </div>
              ))}
            </div>
            <div style={{ display: "grid", gridTemplateColumns: "1fr 1fr", gap: 14, marginBottom: 14 }}>
              <div className="tpanel">
                <div className="tpanel-h"><h3>Most-used Warframes</h3><span className="meta">by mission time</span></div>
                <div style={{ padding: "4px 12px 10px" }}>{MOST_USED.map((m, i) => <BarRow key={i} name={m[0]} mono={m[1]} tier={m[2]} pct={m[3]} max={28} />)}</div>
              </div>
              <div className="tpanel">
                <div className="tpanel-h"><h3>Mission types</h3><span className="meta">last 90 days</span></div>
                <div style={{ padding: "4px 12px 10px" }}>{MISSIONS.map((m, i) => <BarRow key={i} name={m[0]} pct={m[1]} max={32} />)}</div>
              </div>
            </div>
            <div className="statband" style={{ gridTemplateColumns: "repeat(4, 1fr)", margin: 0 }}>
              {PSTAT.map((s, i) => (
                <div className="statbox" key={i}><div className="k">{s[0]}</div><div className="v num">{s[1]}{s[2] && <span className="u">{s[2]}</span>}</div></div>
              ))}
            </div>
          </div>
        );
      }
      function Armory() {
        const [cat, setCat] = React.useState("All");
        const cats = ["All", ...ARM.map((a) => a[0])];
        let rows = ARM.flatMap(([type, items]) => items.map((g) => [...g, type]));
        if (cat !== "All") rows = rows.filter((r) => r[4] === cat);
        return (
          <div>
            <div className="filters" style={{ marginBottom: 10 }}>
              {cats.map((c) => <button key={c} className="chip" aria-pressed={cat === c} onClick={() => setCat(c)}>{c}</button>)}
            </div>
            <table className="dtable">
              <thead><tr><th>Item</th><th>Type</th><th className="r">Level</th><th className="r">Forma</th><th>Mastery</th></tr></thead>
              <tbody>
                {rows.map((r, i) => (
                  <tr key={i}>
                    <td><div className="dnm"><div className={"gl " + r[2]}>{r[1]}</div><div className="di"><span className="nm">{r[0]}</span></div></div></td>
                    <td style={{ color: "var(--soft)" }}>{r[4]}</td>
                    <td className="r num">30</td>
                    <td className="r num">{r[3]}◆</td>
                    <td><span className="badge at">mastered</span></td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        );
      }
      function Codex() {
        return (
          <div>
            <div style={{ display: "flex", alignItems: "baseline", justifyContent: "space-between", marginBottom: 14 }}>
              <div><span style={{ fontFamily: "var(--mono)", fontSize: 30, fontWeight: 800, letterSpacing: "-.03em" }}>68%</span><span style={{ fontSize: 12, color: "var(--soft)", marginLeft: 10 }}>complete · 412 / 631 entries</span></div>
              <button className="chip">View full codex →</button>
            </div>
            {CDX.map((c, i) => (
              <div key={i} style={{ display: "grid", gridTemplateColumns: "120px 1fr 44px", alignItems: "center", gap: 12, padding: "9px 0", borderTop: i ? "1px solid var(--line)" : "none" }}>
                <span style={{ fontSize: 12, color: "var(--soft)" }}>{c[0]}</span>
                <span style={{ height: 6, background: "var(--line)", position: "relative" }}><i style={{ position: "absolute", left: 0, top: 0, bottom: 0, width: c[1] + "%", background: c[1] >= 70 ? "var(--pos)" : "var(--soft)" }} /></span>
                <span style={{ fontFamily: "var(--mono)", fontSize: 12, color: "var(--ink)", textAlign: "right" }}>{c[1]}%</span>
              </div>
            ))}
          </div>
        );
      }

      /* ============================== shell ============================== */
      function Profile() {
        const [tab, setTab] = React.useState("Overview");
        const Body = { Overview, Resources, Armory, Codex, Stats }[tab];
        return (
          <div style={{ color: "var(--ink)", fontFamily: "var(--sans)", background: "var(--bg)", minHeight: "100%" }}>
            {/* breadcrumb bar */}
            <div style={{ display: "flex", alignItems: "center", gap: 10, height: 42, padding: "0 24px", borderBottom: "1px solid var(--line)", background: "var(--bg-2)" }}>
              <span style={{ fontSize: 12, color: "var(--soft)", display: "inline-flex", alignItems: "center", gap: 6 }}>
                <svg className="ico" viewBox="0 0 24 24"><path d="M15 6l-6 6 6 6" /></svg>Back
              </span>
              <span style={{ fontSize: 12, color: "var(--faint)" }}>Account / <span style={{ color: "var(--ink)" }}>bigfinnn</span></span>
              <span style={{ flex: 1 }} />
              <span style={{ fontSize: 11.5, color: "var(--soft)", fontFamily: "var(--mono)", border: "1px solid var(--line-2)", padding: "5px 10px" }}>Jun 12 – Jun 18</span>
              <button className="icon-btn">⚙</button>
            </div>

            {/* header */}
            <div style={{ display: "flex", alignItems: "flex-start", gap: 16, padding: "22px 24px 16px" }}>
              <Emb size={64} />
              <div style={{ flex: 1, minWidth: 0 }}>
                <div style={{ fontSize: 22, fontWeight: 800, letterSpacing: "-.02em" }}>bigfinnn</div>
                <div style={{ fontSize: 12.5, color: "var(--faint)", marginTop: 2 }}>warframe.market/profile/bigfinnn</div>
              </div>
              <div style={{ display: "flex", gap: 8 }}>
                <button className="btn pri sm">⟳ Sync</button>
                <button className="btn sm">Message</button>
                <button className="btn sm">Share</button>
              </div>
            </div>

            {/* info columns */}
            <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 24, padding: "0 24px 18px", borderBottom: "1px solid var(--line)" }}>
              <div>
                <div style={secH}>About</div>
                <InfoRow d="M12 12a4 4 0 1 0 0-8 4 4 0 0 0 0 8M4 20c0-4 4-6 8-6s8 2 8 6">MR 27 · Legendary 2</InfoRow>
                <InfoRow d="M12 21s7-6 7-12a7 7 0 0 0-14 0c0 6 7 12 7 12M12 9a2 2 0 1 0 0 0">Asia · GMT+8</InfoRow>
                <InfoRow d="M5 4h4l2 5-3 2a12 12 0 0 0 5 5l2-3 5 2v4a2 2 0 0 1-2 2A16 16 0 0 1 3 6a2 2 0 0 1 2-2">In-game: bigfinnn</InfoRow>
                <InfoRow d="M5 4h14v16l-7-3-7 3z">Joined 2018 · 1,640 days</InfoRow>
              </div>
              <div>
                <div style={secH}>Account</div>
                <InfoRow d="M3 12a9 9 0 1 0 18 0 9 9 0 0 0-18 0M12 7v10M9 9h4.5a1.5 1.5 0 0 1 0 3H9"><span style={{ color: "var(--plat)" }}>1,240p</span> platinum</InfoRow>
                <InfoRow d="M3 6h18v12H3zM3 10h18">12.4M credits</InfoRow>
                <InfoRow d="M12 3l9 5-9 5-9-5z M3 13l9 5 9-5">48,200 endo</InfoRow>
                <InfoRow d="M4 19V5l8 4 8-4v14l-8 4z">214 distinct items · 54 sets</InfoRow>
              </div>
              <div>
                <div style={secH}>Links</div>
                <InfoRow d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1 1M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1-1">warframe.market ↗</InfoRow>
                <InfoRow d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1 1M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1-1">riven.market ↗</InfoRow>
                <InfoRow d="M10 13a5 5 0 0 0 7 0l3-3a5 5 0 0 0-7-7l-1 1M14 11a5 5 0 0 0-7 0l-3 3a5 5 0 0 0 7 7l1-1">Public profile ↗</InfoRow>
              </div>
            </div>

            {/* tabs */}
            <div style={{ display: "flex", gap: 2, padding: "0 24px", borderBottom: "1px solid var(--line)" }}>
              {TABS.map((t) => {
                const on = tab === t;
                return (
                  <button key={t} onClick={() => setTab(t)} style={{ padding: "12px 14px", background: "transparent", border: "none", borderBottom: on ? "2px solid var(--ink)" : "2px solid transparent", color: on ? "var(--ink)" : "var(--soft)", fontWeight: on ? 700 : 500, fontSize: 13, cursor: "pointer", fontFamily: "var(--sans)", marginBottom: -1 }}>{t}</button>
                );
              })}
            </div>

            {/* body */}
            <div style={{ padding: "18px 24px 28px" }}><Body /></div>
          </div>
        );
      }

      function App() {
        return (
          <DesignCanvas>
            <DCSection id="koala" title="Account · Koala direction" subtitle="Modeled on the Koala UI profile page, re-skinned into WFIT's dark theme. Tabs + D/W/M cards + trades table are all live.">
              <DCArtboard id="K" label="Tenno trader profile" width={1280} height={1080} style={{ background: "var(--bg)" }}><Profile /></DCArtboard>
            </DCSection>
          </DesignCanvas>
        );
      }
      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
