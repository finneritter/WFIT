name: Release

# Push a v* tag → build platform bundles and attach them to a DRAFT GitHub
# release (publish manually after a sanity check). Linux: deb/rpm/AppImage;
# Windows: msi/nsis. macOS is intentionally manual (built on the Mac).
on:
  push:
    tags: ["v*"]
  # Manual fallback: tag-push events occasionally never reach Actions (seen
  # 2026-07-09 with v1.4.0 — tag existed on the remote, no run, GH status
  # green, even after a solo re-push). Dispatch with the tag to build the
  # exact same draft release without depending on event delivery.
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing v* tag to build (e.g. v1.4.0)"
        required: true

permissions:
  contents: write # create the draft release + upload assets

jobs:
  build:
    strategy:
      fail-fast: false # one OS failing must not cancel the other's bundles
      matrix:
        include:
          - os: ubuntu-latest
          - os: windows-latest
    runs-on: ${{ matrix.os }}
    # One place resolves the tag for both trigger paths (inputs is empty on
    # tag pushes, ref_name is "main"-less on dispatch — the || covers both).
    env:
      RELEASE_TAG: ${{ inputs.tag || github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag || github.ref_name }}
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # Tauri links against the system webview/gtk stack (same list as ci.yml).
      - name: Install Tauri Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            build-essential \
            pkg-config \
            libssl-dev \
            libpipewire-0.3-dev \
            libgbm-dev \
            libclang-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      # The bundle filenames embed the bare version (tag minus the "v"), so the
      # release body's direct download links can be templated from it.
      - name: Version from tag
        id: ver
        shell: bash
        run: echo "num=${RELEASE_TAG#v}" >> "$GITHUB_OUTPUT"
      # Runs beforeBuildCommand (npm run build), cargo build --release, bundles,
      # and uploads every artifact to one draft release keyed by the tag.
      # The body puts a direct-link download table front and center — the
      # collapsed "Assets" widget alone is easy for non-developers to miss.
      # TAURI_SIGNING_*: sign the updater artifacts (`createUpdaterArtifacts`)
      # so installed apps can verify updates. tauri-action also generates and
      # uploads latest.json (the updater feed) automatically.
      # updaterJsonPreferNsis: the single windows-x86_64 feed entry points at
      # the NSIS installer — MSI→NSIS upgrade is supported, the reverse isn't.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ env.RELEASE_TAG }}
          releaseName: "WFIT ${{ env.RELEASE_TAG }}"
          releaseDraft: true
          updaterJsonPreferNsis: true
          releaseBody: |
            ## ⬇️ Downloads

            | Platform | Download | Notes |
            |---|---|---|
            | **Windows 10/11** | [WFIT_${{ steps.ver.outputs.num }}_x64-setup.exe](https://github.com/${{ github.repository }}/releases/download/${{ env.RELEASE_TAG }}/WFIT_${{ steps.ver.outputs.num }}_x64-setup.exe) | Recommended. Unsigned for now — SmartScreen will warn: click **More info → Run anyway**. |
            | Windows (MSI) | [WFIT_${{ steps.ver.outputs.num }}_x64_en-US.msi](https://github.com/${{ github.repository }}/releases/download/${{ env.RELEASE_TAG }}/WFIT_${{ steps.ver.outputs.num }}_x64_en-US.msi) | Alternative installer. |
            | **Linux — any distro** | [WFIT_${{ steps.ver.outputs.num }}_amd64.AppImage](https://github.com/${{ github.repository }}/releases/download/${{ env.RELEASE_TAG }}/WFIT_${{ steps.ver.outputs.num }}_amd64.AppImage) | `chmod +x` and run. Needs `webkit2gtk-4.1`. |
            | Debian / Ubuntu | [WFIT_${{ steps.ver.outputs.num }}_amd64.deb](https://github.com/${{ github.repository }}/releases/download/${{ env.RELEASE_TAG }}/WFIT_${{ steps.ver.outputs.num }}_amd64.deb) | `sudo apt install ./WFIT_${{ steps.ver.outputs.num }}_amd64.deb` |
            | Fedora / RHEL | [WFIT-${{ steps.ver.outputs.num }}-1.x86_64.rpm](https://github.com/${{ github.repository }}/releases/download/${{ env.RELEASE_TAG }}/WFIT-${{ steps.ver.outputs.num }}-1.x86_64.rpm) | `sudo dnf install ./WFIT-${{ steps.ver.outputs.num }}-1.x86_64.rpm` |

            macOS: no prebuilt bundle — build from source on a Mac (`npm run tauri build`).

            ## What's new

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md).

            Installed copies (Windows / AppImage) update themselves from Settings › About; deb/rpm installs get an in-app notification pointing here.
