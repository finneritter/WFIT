name: Release

# Push a v* tag → build platform bundles and attach them to a DRAFT GitHub
# release (publish manually after a sanity check). Linux: deb/rpm/AppImage;
# Windows: msi/nsis. macOS is intentionally manual (built on the Mac).
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the draft release + upload assets

jobs:
  build:
    strategy:
      fail-fast: false # one OS failing must not cancel the other's bundles
      matrix:
        include:
          - os: ubuntu-latest
          - os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # Tauri links against the system webview/gtk stack (same list as ci.yml).
      - name: Install Tauri Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            build-essential \
            pkg-config \
            libssl-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      # Runs beforeBuildCommand (npm run build), cargo build --release, bundles,
      # and uploads every artifact to one draft release keyed by the tag.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "WFIT ${{ github.ref_name }}"
          releaseDraft: true
          # Beta phase: every release is marked pre-release until a stable 1.x.
          prerelease: true
          releaseBody: "Beta build — see CHANGELOG.md for what's new. Windows: the installer is unsigned; SmartScreen will warn (More info → Run anyway). Linux: the AppImage needs webkit2gtk-4.1."
