name: Release

# Push a v* tag → build platform bundles and attach them to a DRAFT GitHub
# release (publish manually after a sanity check). Linux: deb/rpm/AppImage;
# Windows: msi/nsis. macOS is intentionally manual (built on the Mac).
on:
  push:
    tags: ["v*"]

permissions:
  contents: write # create the draft release + upload assets

jobs:
  build:
    strategy:
      fail-fast: false # one OS failing must not cancel the other's bundles
      matrix:
        include:
          - os: ubuntu-latest
          - os: windows-latest
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # Tauri links against the system webview/gtk stack (same list as ci.yml).
      - name: Install Tauri Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            build-essential \
            pkg-config \
            libssl-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - run: npm ci
      # The bundle filenames embed the bare version (tag minus the "v"), so the
      # release body's direct download links can be templated from it.
      - name: Version from tag
        id: ver
        shell: bash
        run: echo "num=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"
      # Runs beforeBuildCommand (npm run build), cargo build --release, bundles,
      # and uploads every artifact to one draft release keyed by the tag.
      # The body puts a direct-link download table front and center — the
      # collapsed "Assets" widget alone is easy for non-developers to miss.
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "WFIT ${{ github.ref_name }}"
          releaseDraft: true
          releaseBody: |
            ## ⬇️ Downloads

            | Platform | Download | Notes |
            |---|---|---|
            | **Windows 10/11** | [WFIT_${{ steps.ver.outputs.num }}_x64-setup.exe](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/WFIT_${{ steps.ver.outputs.num }}_x64-setup.exe) | Recommended. Unsigned for now — SmartScreen will warn: click **More info → Run anyway**. |
            | Windows (MSI) | [WFIT_${{ steps.ver.outputs.num }}_x64_en-US.msi](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/WFIT_${{ steps.ver.outputs.num }}_x64_en-US.msi) | Alternative installer. |
            | **Linux — any distro** | [WFIT_${{ steps.ver.outputs.num }}_amd64.AppImage](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/WFIT_${{ steps.ver.outputs.num }}_amd64.AppImage) | `chmod +x` and run. Needs `webkit2gtk-4.1`. |
            | Debian / Ubuntu | [WFIT_${{ steps.ver.outputs.num }}_amd64.deb](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/WFIT_${{ steps.ver.outputs.num }}_amd64.deb) | `sudo apt install ./WFIT_${{ steps.ver.outputs.num }}_amd64.deb` |
            | Fedora / RHEL | [WFIT-${{ steps.ver.outputs.num }}-1.x86_64.rpm](https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/WFIT-${{ steps.ver.outputs.num }}-1.x86_64.rpm) | `sudo dnf install ./WFIT-${{ steps.ver.outputs.num }}-1.x86_64.rpm` |

            macOS: no prebuilt bundle — build from source on a Mac (`npm run tauri build`).

            ## What's new

            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md).
