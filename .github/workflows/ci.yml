name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (tsc + vite + biome)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build # tsc --noEmit + vite build
      - run: npx biome ci .

  rust:
    name: Rust (fmt + clippy + test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      # tauri::generate_context! panics at COMPILE time if frontendDist
      # (../dist) doesn't exist; this job never builds the frontend, so give it
      # an empty dir. (rust-cache masked this until lib.rs changed.)
      - run: mkdir -p dist
      # Tauri links against the system webview/gtk stack even for `cargo test`.
      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libxdo-dev \
            build-essential \
            pkg-config \
            libssl-dev \
            libpipewire-0.3-dev \
            libclang-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: cargo fmt
        run: cargo fmt --check
        working-directory: src-tauri
      # --features dev-dashboard: defaults are lean (release bundles ship
      # without the dashboard), but the dashboard code must stay green — it's
      # what `npm run tauri:dev` and `scripts/install.sh` build.
      - name: cargo clippy
        run: cargo clippy --features dev-dashboard -- -D warnings
        working-directory: src-tauri
      - name: cargo test
        run: cargo test --features dev-dashboard
        working-directory: src-tauri
      # The lean (public release) configuration must also compile and must not
      # link the dashboard's HTTP stack. A no-relic-ocr build must stay green
      # too (matching/preprocess/layout are always-compiled by contract).
      - name: cargo check (lean release config)
        run: |
          cargo check
          cargo check --no-default-features --features custom-protocol
          if cargo tree -e no-dev | grep -q axum; then
            echo "lean build still links axum" && exit 1
          fi
        working-directory: src-tauri
